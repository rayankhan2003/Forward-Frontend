<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forward System Admin Portal</title>
    <meta name="description" content="Forward System Admin Portal – manage campuses, students, faculty and reports.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-container">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">Forward System</span>
            <span class="logo-subtext">ADMIN PORTAL</span>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li class="{{ 'active' if active_page == 'dashboard' else '' }}">
                    <a href="/">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        DASHBOARD
                    </a>
                </li>
                <li class="{{ 'active' if active_page == 'campuses' else '' }}">
                    <a href="/campuses">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                        CAMPUSES
                    </a>
                </li>
                <li class="{{ 'active' if active_page == 'students' else '' }}">
                    <a href="/students">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                        STUDENTS
                    </a>
                </li>
                <li class="{{ 'active' if active_page == 'faculty' else '' }}">
                    <a href="/faculty">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        FACULTY
                    </a>
                </li>
                <li class="{{ 'active' if active_page == 'reports' else '' }}">
                    <a href="/reports">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="6" height="18"/><rect x="9" y="8" width="6" height="13"/><rect x="16" y="13" width="6" height="8"/></svg>
                        REPORTS
                    </a>
                </li>
                <li class="{{ 'active' if active_page == 'settings' else '' }}">
                    <a href="/settings">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        SETTINGS
                    </a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <button class="btn btn-primary">+ New Report</button>
        </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main-content">

        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <select class="search-dropdown" id="school-select">
                        <option>All Schools</option>
                        <option>Phase 1 Campus</option>
                        <option>Phase 2 Campus</option>
                        <option>Ring Road Campus</option>
                    </select>
                </div>
                <nav class="campus-tabs">
                    <a href="#" class="campus-tab active" data-campus="all">All Schools</a>
                    <a href="#" class="campus-tab" data-campus="phase1">Phase 1 Campus</a>
                    <a href="#" class="campus-tab" data-campus="phase2">Phase 2 Campus</a>
                    <a href="#" class="campus-tab" data-campus="ringroad">Ring Road Campus</a>
                </nav>
            </div>
            <div class="topbar-right">
                <button class="icon-btn" title="Notifications">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </button>
                <button class="icon-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">SUPER ADMINISTRATOR</span>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=0F172A&color=fff&size=80" alt="Avatar" class="avatar">
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script>
    // Campus tab switching
    document.querySelectorAll('.campus-tab').forEach(tab => {
        tab.addEventListener('click', e => {
            e.preventDefault();
            document.querySelectorAll('.campus-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            // sync dropdown
            const map = {all:'All Schools', phase1:'Phase 1 Campus', phase2:'Phase 2 Campus', ringroad:'Ring Road Campus'};
            document.getElementById('school-select').value = map[tab.dataset.campus];
        });
    });
    document.getElementById('school-select').addEventListener('change', function() {
        const rev = {'All Schools':'all', 'Phase 1 Campus':'phase1', 'Phase 2 Campus':'phase2', 'Ring Road Campus':'ringroad'};
        document.querySelectorAll('.campus-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.campus-tab[data-campus="${rev[this.value]}"]`).classList.add('active');
    });
</script>
</body>
</html>
